<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #1E1F2B;
      color: #a0a8c8;
      margin: 0;
    }
    h2 { margin: 0 0 12px; font-size: 16px; color: #c0c8e8; }
    label { display: block; font-size: 12px; margin-bottom: 4px; opacity: 0.7; }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #3A3C4D;
      border-radius: 6px;
      font-size: 13px;
      background: #16171f;
      color: #a0a8c8;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 9px;
      background: #2e3048;
      color: #c0c8e8;
      border: 1px solid #3A3C4D;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #3a3d5c; }
    .saved { color: #6ec97a; font-size: 12px; text-align: center; margin-top: 6px; display: none; }
  </style>
</head>
<body>
  <h2>📖 Book Reader</h2>
  <label>Book URL</label>
  <input type="text" id="urlInput" placeholder="https://...">
  <button id="saveBtn">Save URL</button>
  <div class="saved" id="saved">✓ Saved!</div>
  <script src="popup.js"></script>
</body>
</html>
